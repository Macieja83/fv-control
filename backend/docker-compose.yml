# Lokalny stack: Postgres + Redis + MinIO; API i worker w kontenerze tylko z profilem `docker-app`.
#
# Domyślnie: `docker compose up -d` = postgres + redis + minio (API/worker na hoście przez npm lub systemd).
# Pełny stack w Dockerze: `docker compose --profile docker-app up -d --build`
#
# Uwaga (VPS): nie uruchamiaj jednocześnie workera w Dockerze i `fv-control-worker.service` — wspólna kolejka BullMQ,
# inne katalogi uploadów → OCR kończy się błędem „brak pliku w storage”.
#
# Migracje Prisma: przy starcie kontenera **api** (Dockerfile CMD).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fvresta
      POSTGRES_PASSWORD: fvresta
      POSTGRES_DB: fvresta
    ports:
      - "5432:5432"
    volumes:
      - fvcontrol_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fvresta -d fvresta"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fvcontrol_minio:/data

  api:
    profiles:
      - docker-app
    build:
      context: .
      dockerfile: Dockerfile
    # Na VPS: `cp .env.production.example .env` w katalogu `backend/` i uzupełnij sekrety — reszta zmiennych trafia do kontenera.
    env_file:
      - path: .env
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://fvresta:fvresta@postgres:5432/fvresta?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-min-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-min-32-chars!}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      UPLOAD_DIR: /app/storage/uploads
      LOG_LEVEL: info
      APP_NAME: FVControl API
      APP_VERSION: "1.0.0"
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123456}
      S3_BUCKET: ${S3_BUCKET:-fvcontrol-documents}
      S3_FORCE_PATH_STYLE: "true"
      # NODE_ENV=production: loadConfig() wymaga false + METRICS_BEARER_TOKEN (min. 24 znaki).
      FEATURE_AI_EXTRACTION_MOCK: ${FEATURE_AI_EXTRACTION_MOCK:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-compose-local-metrics-bearer-token!!}
    ports:
      - "3000:3000"
    volumes:
      - fvcontrol_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker startuje po healthy API — wtedy `prisma migrate deploy` w CMD obrazu API już się wykonał.
  worker:
    profiles:
      - docker-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://fvresta:fvresta@postgres:5432/fvresta?schema=public
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-min-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-min-32-chars!}
      LOG_LEVEL: info
      APP_NAME: FVControl API
      APP_VERSION: "1.0.0"
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_DIR: /app/storage/uploads
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123456}
      S3_BUCKET: ${S3_BUCKET:-fvcontrol-documents}
      S3_FORCE_PATH_STYLE: "true"
      FEATURE_AI_EXTRACTION_MOCK: ${FEATURE_AI_EXTRACTION_MOCK:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-compose-local-metrics-bearer-token!!}
      IMAP_AUTO_SYNC_INTERVAL_MS: ${IMAP_AUTO_SYNC_INTERVAL_MS:-300000}
      HOUSEKEEPING_INTERVAL_MS: ${HOUSEKEEPING_INTERVAL_MS:-60000}
    volumes:
      - fvcontrol_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  fvcontrol_pg:
  fvcontrol_uploads:
  fvcontrol_minio:
