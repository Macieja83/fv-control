services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fvresta
      POSTGRES_PASSWORD: fvresta
      POSTGRES_DB: fvresta
    ports:
      - "5432:5432"
    volumes:
      - fvcontrol_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fvresta -d fvresta"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fvcontrol_minio:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://fvresta:fvresta@postgres:5432/fvresta?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-min-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-min-32-chars!}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      UPLOAD_DIR: /app/storage/uploads
      LOG_LEVEL: info
      APP_NAME: FVControl API
      APP_VERSION: "1.0.0"
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123456}
      S3_BUCKET: ${S3_BUCKET:-fvcontrol-documents}
      S3_FORCE_PATH_STYLE: "true"
      FEATURE_AI_EXTRACTION_MOCK: "true"
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-dev-webhook-signing-secret-min-16}
      WEBHOOK_MAX_SKEW_SECONDS: ${WEBHOOK_MAX_SKEW_SECONDS:-300}
    ports:
      - "3000:3000"
    volumes:
      - fvcontrol_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://fvresta:fvresta@postgres:5432/fvresta?schema=public
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-min-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-min-32-chars!}
      LOG_LEVEL: info
      APP_NAME: FVControl API
      APP_VERSION: "1.0.0"
      FEATURE_AI_EXTRACTION_MOCK: "true"
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-dev-webhook-signing-secret-min-16}
      WEBHOOK_DELIVERY_INTERVAL_MS: ${WEBHOOK_DELIVERY_INTERVAL_MS:-5000}
      WEBHOOK_DELIVERY_MAX_ATTEMPTS: ${WEBHOOK_DELIVERY_MAX_ATTEMPTS:-10}
      WEBHOOK_HTTP_TIMEOUT_MS: ${WEBHOOK_HTTP_TIMEOUT_MS:-15000}
      WEBHOOK_MAX_SKEW_SECONDS: ${WEBHOOK_MAX_SKEW_SECONDS:-300}
      WEBHOOK_OUTBOX_SENT_RETENTION_DAYS: ${WEBHOOK_OUTBOX_SENT_RETENTION_DAYS:-90}
      WEBHOOK_PROCESSING_STALE_MS: ${WEBHOOK_PROCESSING_STALE_MS:-900000}
      HOUSEKEEPING_INTERVAL_MS: ${HOUSEKEEPING_INTERVAL_MS:-60000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  fvcontrol_pg:
  fvcontrol_uploads:
  fvcontrol_minio:
