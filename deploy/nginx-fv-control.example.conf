# Przykład nginx: statyczny frontend (Vite dist) + reverse proxy do Fastify na :3000.
# Skopiuj do /etc/nginx/sites-available/, dostosuj server_name i ścieżki, potem:
#   sudo nginx -t && sudo systemctl reload nginx

upstream fvcontrol_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name app.twojadomena.pl;

    # ssl_certificate /etc/letsencrypt/live/app.twojadomena.pl/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.twojadomena.pl/privkey.pem;

    root /var/www/fv-control;
    index index.html;

    # SPA — fallback do index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Fastify (prefiks /api/v1 w aplikacji)
    location /api/ {
        proxy_pass http://fvcontrol_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 30m;
    }
}

server {
    listen 80;
    server_name app.twojadomena.pl;
    return 301 https://$host$request_uri;
}
