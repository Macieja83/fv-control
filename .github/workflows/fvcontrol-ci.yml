name: FVControl CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://fvresta:fvresta@localhost:5432/fvresta?schema=public

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-quality
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fvresta
          POSTGRES_PASSWORD: fvresta
          POSTGRES_DB: fvresta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fvresta -d fvresta"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Migrate (deploy)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://fvresta:fvresta@localhost:5432/fvresta?schema=public

      - name: Seed (demo data for integration tests)
        run: npx prisma db seed
        env:
          DATABASE_URL: postgresql://fvresta:fvresta@localhost:5432/fvresta?schema=public
          ENCRYPTION_KEY: AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE=

      - name: Test
        run: npm run test
        env:
          DATABASE_URL: postgresql://fvresta:fvresta@localhost:5432/fvresta?schema=public
          NODE_ENV: test
